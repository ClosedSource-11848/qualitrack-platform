# Development profile

spring.datasource.url=jdbc:mysql://${DATABASE_URL:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:qualitrack}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&publicKeyRetrieval=true

spring.datasource.username=${DATABASE_USER:}

spring.datasource.password=${DATABASE_PASSWORD:}

# Developer-friendly JPA behavior
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# App port
server.port=${PORT:8080}