# Production profile

spring.datasource.url=jdbc:mysql://${DATABASE_URL}:${DATABASE_PORT:3306}/${DATABASE_NAME}?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=false&publicKeyRetrieval=true

spring.datasource.username=${DATABASE_USER}

spring.datasource.password=${DATABASE_PASSWORD}

# Production-lean JPA behavior
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# App port
server.port=${PORT:8080}

# JWT secret
authorization.jwt.secret=${JWT_SECRET}

stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}